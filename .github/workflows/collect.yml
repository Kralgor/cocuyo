name: collect

on:
  # Schedules disabled until pipeline is complete — re-enable when ready
  # schedule:
  #   - cron: '*/10 * * * *'   # collect: every 10 min
  #   - cron: '0 0 * * 0'      # retrain: Sunday midnight UTC
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run manually'
        type: choice
        options: [collect, retrain]
        default: collect

# Only one collect run at a time; retrain runs independently.
concurrency:
  group: cocuyo-${{ github.event.schedule == '0 0 * * 0' && 'retrain' || 'pipeline' }}
  cancel-in-progress: true

# ── collect: every 10 min ──────────────────────────────────────────────────────

jobs:
  collect:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '*/10 * * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'collect')
    runs-on: ubuntu-22.04
    timeout-minutes: 8

    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      R2_ENDPOINT_URL:           ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID:          ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY:      ${{ secrets.R2_SECRET_ACCESS_KEY }}
      CF_API_TOKEN:              ${{ secrets.CF_API_TOKEN }}
      NASA_TOKEN:                ${{ secrets.NASA_TOKEN }}
      COCUYO_PHASE:              ${{ vars.COCUYO_PHASE }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      - run: python -m pipeline.main

# ── retrain: weekly Sunday midnight UTC ───────────────────────────────────────

  retrain:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 0 * * 0') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'retrain')
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      R2_ENDPOINT_URL:           ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID:          ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY:      ${{ secrets.R2_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Train duration model
        run: python -m pipeline.train_duration_model

      - name: Upload models to R2
        run: |
          python - <<'EOF'
          import boto3, os

          s3 = boto3.client(
              "s3",
              endpoint_url=os.environ["R2_ENDPOINT_URL"],
              aws_access_key_id=os.environ["R2_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["R2_SECRET_ACCESS_KEY"],
          )
          for fname in ["duration_model.pkl", "duration_features.pkl"]:
              path = f"models/{fname}"
              if os.path.exists(path):
                  s3.upload_file(path, "cocuyo", f"models/{fname}")
                  print(f"uploaded {path}")
              else:
                  print(f"skipped {path} (not found — sparse data?)")
          EOF
